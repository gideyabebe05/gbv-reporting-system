{% extends 'reports/base.html' %}

{% block title %}Report GBV Incident - Tigray{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl p-10">

    <h1 class="text-3xl font-bold text-center text-teal-700 mb-8">🛡️ Secure Anonymous GBV Report</h1>

    <form method="POST" class="space-y-8">
        {% csrf_token %}

        <!-- Emergency Checkbox - Very Visible -->
        <div class="bg-red-50 border border-red-300 rounded-3xl p-6 flex items-center gap-4">
            <input type="checkbox" name="is_emergency" id="emergency" class="w-6 h-6 accent-red-600">
            <div>
                <label for="emergency" class="font-semibold text-red-700 text-lg">This is an Emergency / Immediate Danger</label>
                <p class="text-red-600 text-sm">Select this if the victim is in immediate danger</p>
            </div>
        </div>

        <!-- Rest of the form (Incident Type, Description, etc.) -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Incident Type <span class="text-red-500">*</span></label>
            <select name="incident_type" class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-teal-500 text-lg" required>
                <option value="">Select Type of Violence</option>
                <option value="physical">Physical Violence</option>
                <option value="sexual">Sexual Violence</option>
                <option value="psychological">Psychological / Emotional Abuse</option>
                <option value="economic">Economic Abuse</option>
                <option value="harmful_practice">Harmful Traditional Practice</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Description of the Incident <span class="text-red-500">*</span></label>
            <textarea name="description" rows="5" class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-teal-500" placeholder="Please describe what happened..." required></textarea>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Location</label>
            <input type="text" name="location" class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-teal-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Incident Date</label>
            <input type="date" name="incident_date" class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-teal-500">
        </div>

        <div class="flex items-center gap-3">
            <input type="checkbox" name="is_anonymous" id="anonymous" checked class="w-5 h-5 accent-teal-600">
            <label for="anonymous" class="text-gray-700 font-medium">Report Anonymously (recommended)</label>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Full Name <span class="text-xs text-gray-500">(optional)</span></label>
            <input type="text" name="name" class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-teal-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number <span class="text-xs text-gray-500">(optional)</span></label>
            <input type="tel" name="phone" class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-teal-500">
        </div>

        <div class="flex items-center gap-3">
            <input type="checkbox" name="consent_to_followup" id="consent" class="w-5 h-5 accent-teal-600">
            <label for="consent" class="text-gray-700">I consent to follow-up contact if needed</label>
        </div>

        <button type="submit" class="w-full mt-8 bg-teal-600 hover:bg-teal-700 text-white py-5 rounded-3xl text-xl font-semibold transition">
            Submit Report Securely
        </button>
    </form>
</div>
{% endblock %}
