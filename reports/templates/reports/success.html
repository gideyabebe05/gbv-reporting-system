{% extends 'reports/base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto mt-20 text-center px-6">
    <div class="inline-flex items-center justify-center w-24 h-24 bg-green-100 rounded-full mb-8">
        <span class="text-6xl">✅</span>
    </div>
    <h1 class="text-4xl font-bold text-green-800 mb-4">Thank You</h1>
    <p class="text-xl text-gray-700">Your report has been received safely.</p>
    <p class="text-gray-600 mt-6">A support organization will review it shortly. Help is on the way.</p>
    
    <a href="{% url 'report_form' %}" 
       class="mt-10 inline-block bg-green-700 text-white px-8 py-4 rounded-2xl font-semibold hover:bg-green-800">
        Report Another Incident
    </a>
</div>
{% endblock %}
