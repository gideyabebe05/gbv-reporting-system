{% extends 'reports/base.html' %}

{% block title %}Report Submitted Successfully{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto text-center py-20 px-6">
    <div class="mx-auto w-24 h-24 bg-teal-100 rounded-full flex items-center justify-center text-6xl mb-8">
        ✅
    </div>

    <h1 class="text-4xl font-bold text-teal-700 mb-4">Report Submitted Successfully!</h1>
    <p class="text-xl text-gray-600 mb-10">Thank you. Your report is safe and anonymous.</p>

    <div class="bg-teal-50 border border-teal-200 rounded-3xl p-10 mb-12">
        <p class="text-sm font-medium text-teal-600 tracking-widest mb-2">YOUR TRACKING ID</p>
        <p class="text-5xl font-mono font-bold text-teal-800" id="trackingId">{{ tracking_id }}</p>
        
        <button onclick="copyTrackingId()" 
                class="mt-6 flex items-center justify-center gap-2 mx-auto bg-teal-600 hover:bg-teal-700 text-white px-8 py-3 rounded-3xl font-medium">
            📋 Copy Tracking ID
        </button>
    </div>

    <div class="flex flex-col sm:flex-row gap-4">
        <a href="/track/" class="flex-1 bg-teal-600 hover:bg-teal-700 text-white py-5 rounded-3xl font-semibold">
            🔍 Track My Report
        </a>
        <a href="/report/" class="flex-1 border-2 border-teal-600 text-teal-700 hover:bg-teal-50 py-5 rounded-3xl font-semibold">
            Submit Another Report
        </a>
    </div>
</div>

<script>
function copyTrackingId() {
    const text = document.getElementById('trackingId').innerText;
    navigator.clipboard.writeText(text).then(() => {
        alert('✅ Tracking ID copied to clipboard!');
    });
}
</script>
{% endblock %}
