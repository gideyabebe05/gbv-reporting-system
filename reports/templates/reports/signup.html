{% extends 'reports/base.html' %}

{% block title %}Create Account - Tigray GBV Support{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white rounded-3xl shadow-xl p-10">
        <div class="text-center mb-8">
            <div class="mx-auto w-16 h-16 bg-teal-600 rounded-2xl flex items-center justify-center text-4xl mb-4">🛡️</div>
            <h1 class="text-3xl font-bold">Create New Account</h1>
            <p class="text-gray-600">Join Tigray GBV Support System</p>
        </div>

        {% if error %}
            <div class="bg-red-50 text-red-600 p-4 rounded-2xl mb-6 text-center">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-2">Username</label>
                    <input type="text" name="username" required 
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-teal-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Email Address</label>
                    <input type="email" name="email" required 
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-teal-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Password</label>
                    <input type="password" name="password1" required 
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-teal-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Confirm Password</label>
                    <input type="password" name="password2" required 
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-teal-500">
                </div>
            </div>

            <button type="submit" 
                    class="w-full mt-10 bg-teal-600 hover:bg-teal-700 text-white py-5 rounded-3xl font-semibold text-lg transition">
                Create Account
            </button>
        </form>

        <p class="text-center mt-8 text-gray-600">
            Already have an account? 
            <a href="/login/" class="text-teal-600 font-medium">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
